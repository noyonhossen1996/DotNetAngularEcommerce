<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
  <div class="container">
    <a class="navbar-brand fw-semibold" routerLink="/products">
      <i class="bi bi-shop me-2"></i>
      ECommerce
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/products"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Products
          </a>
        </li>

        @if (authService.isAdmin()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/products/create" routerLinkActive="active">
              Create Product
            </a>
          </li>
        }
      </ul>

      <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2">
        @if (authService.isLoggedIn()) {
          <span class="navbar-text">
            <i class="bi bi-person-circle me-1"></i>
            {{ authService.currentUser()?.fullName }}
          </span>
          <button class="btn btn-outline-danger btn-sm" type="button" (click)="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>
            Logout
          </button>
        } @else {
          <a class="btn btn-outline-primary btn-sm" routerLink="/login" routerLinkActive="active">
            Login
          </a>
          <a class="btn btn-primary btn-sm" routerLink="/register" routerLinkActive="active">
            Register
          </a>
        }
      </div>
    </div>
  </div>
</nav>
